<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sunday Care Schedule - MaCristina & Papi</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; padding: 0; font-family: 'Quicksand', -apple-system, BlinkMacSystemFont, sans-serif; }
        #root { width: 100%; min-height: 100vh; }
    </style>
</head>
<body>
<div id="root"></div>
<script>
    const firebaseConfig = {
        apiKey: "AIzaSyD8CS9GHLmONH7Timj4bJyGPskZevOn8jg",
        authDomain: "papi-sundaygap.firebaseapp.com",
        databaseURL: "https://papi-sundaygap-default-rtdb.firebaseio.com",
        projectId: "papi-sundaygap",
        storageBucket: "papi-sundaygap.firebasestorage.app",
        messagingSenderId: "93846168368",
        appId: "1:93846168368:web:61c226190142d2de9d9ef5"
    };
    window.firebaseReady = false;
    if (typeof firebase !== 'undefined') {
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        window.firebaseReady = true;
    }
</script>
<script type="text/babel">
    /** @jsxRuntime classic */
    const { useState, useEffect } = React;

    const PALETTE = [
        '#F38181','#FF6B9D','#FF8C42','#F9A825','#FFE66D',
        '#A8E6CF','#48BB78','#4ECDC4','#4A90D9','#667EEA',
        '#AA96DA','#9C27B0','#FCBAD3','#FFD3B6','#E91E63',
        '#00BCD4','#38B2AC','#3182CE','#805AD5','#718096'
    ];

    // ── Phone formatting helpers ──────────────────────────────────────
    const digitsOnly    = (v) => v.replace(/\D/g, '');
    const toE164        = (v) => { const d = digitsOnly(v); if (d.length === 10) return `+1${d}`; if (d.length === 11 && d.startsWith('1')) return `+${d}`; return `+1${d}`; };
    const toDisplay     = (v) => { if (!v) return ''; const d = digitsOnly(v).slice(-10); if (d.length !== 10) return v; return `(${d.slice(0,3)}) ${d.slice(3,6)}-${d.slice(6)}`; };
    const formatAsTyped = (v) => { const d = digitsOnly(v).slice(0,10); if (!d.length) return ''; if (d.length <= 3) return `(${d}`; if (d.length <= 6) return `(${d.slice(0,3)}) ${d.slice(3)}`; return `(${d.slice(0,3)}) ${d.slice(3,6)}-${d.slice(6)}`; };

    function CaregiverCalendar() {
        const initialCaregivers = [
            { name: 'Alexandra', code: 'AL', color: '#AA96DA', phone: '' },
            { name: 'Andres',    code: 'AN', color: '#F38181', phone: '' },
            { name: 'Claudia',   code: 'CL', color: '#FCBAD3', phone: '' },
            { name: 'David',     code: 'DA', color: '#4A90D9', phone: '' },
            { name: 'Eloisa',    code: 'EL', color: '#FF8C42', phone: '' },
            { name: 'Gina',      code: 'GI', color: '#FFE66D', phone: '' },
            { name: 'Karen',     code: 'KA', color: '#FF6B9D', phone: '' },
            { name: 'Raquel',    code: 'RA', color: '#FFD3B6', phone: '' },
            { name: 'Sonia',     code: 'SO', color: '#4ECDC4', phone: '' }
        ];
        const [caregivers,        setCaregivers]        = useState(initialCaregivers);
        const [schedule,          setSchedule]          = useState({});
        const [selectedSunday,    setSelectedSunday]    = useState(null);
        const [showAddCaregiver,  setShowAddCaregiver]  = useState(false);
        const [newCaregiver,      setNewCaregiver]      = useState({ name: '', code: '', color: PALETTE[0], phone: '', smsOptIn: false });
        const [editingColorFor,   setEditingColorFor]   = useState(null);
        const [editingPhoneFor,   setEditingPhoneFor]   = useState(null);
        const [editPhoneValue,    setEditPhoneValue]    = useState('');
        const [editOptIn,         setEditOptIn]         = useState(false);
        const [loaded,            setLoaded]            = useState(false);
        const [firebaseAvailable, setFirebaseAvailable] = useState(false);
        const [sendingDate,       setSendingDate]       = useState(null);
        const [sentDates,         setSentDates]         = useState({});

        useEffect(() => { setFirebaseAvailable(window.firebaseReady === true); }, []);
        useEffect(() => {
            if (!firebaseAvailable) { setLoaded(true); return; }
            const cgRef = firebase.database().ref('caregivers');
            const scRef = firebase.database().ref('schedule');
            cgRef.on('value', snap => {
                const data = snap.val();
                if (data) { setCaregivers(data.map(c => { const m = { phone: '', smsOptIn: false, consentStatus: 'none', ...c }; if (!c.consentStatus) m.consentStatus = c.smsOptIn ? 'confirmed' : 'none'; m.smsOptIn = m.consentStatus === 'confirmed'; return m; })); }
                else { cgRef.set(initialCaregivers); }
                setLoaded(true);
            });
            scRef.on('value', snap => {
                let s = snap.val() || {};
                if (!s['2026-04-12']) { s['2026-04-12'] = 'AN'; scRef.set(s); }
                setSchedule(s);
            });
            return () => { cgRef.off(); scRef.off(); };
        }, [firebaseAvailable]);

        const updateCaregivers = (next) => { setCaregivers(next); if (firebaseAvailable) firebase.database().ref('caregivers').set(next); };
        const updateSchedule   = (next) => { setSchedule(next);   if (firebaseAvailable) firebase.database().ref('schedule').set(next); };

        const getSundays = () => {
            const sundays = [];
            const today = new Date(); today.setHours(0,0,0,0);
            const startDate = new Date('2026-04-12'); startDate.setHours(0,0,0,0);
            let cur = new Date(today);
            while (cur.getDay() !== 0) cur.setDate(cur.getDate() - 1);
            const past = [];
            for (let i = 1; i <= 12; i++) {
                const ps = new Date(cur); ps.setDate(cur.getDate() - i * 7);
                if (ps < startDate) break;
                past.unshift(ps);
            }
            sundays.push(...past);
            for (let i = 0; sundays.length < 30; i++) { const fs = new Date(cur); fs.setDate(cur.getDate() + i * 7); sundays.push(fs); }
            return sundays;
        };

        const sundays = getSundays();
        const today   = new Date(); today.setHours(0,0,0,0);
        const daysUntilSunday = (7 - today.getDay()) % 7;
        const upcomingSunday  = new Date(today); upcomingSunday.setDate(today.getDate() + daysUntilSunday);
        const formatDate        = d => d.toISOString().split('T')[0];
        const formatDisplayDate = d => `${d.toLocaleDateString('en-US', { month: 'short' })} ${d.getDate()}`;

        const assignCaregiver = (sunday, code) => { updateSchedule({ ...schedule, [formatDate(sunday)]: code }); setSelectedSunday(null); };
        const clearAssignment = (sunday) => { const next = { ...schedule }; delete next[formatDate(sunday)]; updateSchedule(next); };
        const addCaregiver    = () => { if (!newCaregiver.name || !newCaregiver.code) return; const { smsOptIn, ...rest } = newCaregiver; updateCaregivers([...caregivers, { ...rest, phone: newCaregiver.phone ? toE164(newCaregiver.phone) : '', smsOptIn: false, consentStatus: 'none' }]); setNewCaregiver({ name: '', code: '', color: PALETTE[0], phone: '', smsOptIn: false }); setShowAddCaregiver(false); };
        const changeColor     = (code, color) => { updateCaregivers(caregivers.map(c => c.code === code ? { ...c, color } : c)); setEditingColorFor(null); };
        const savePhone       = (code) => { updateCaregivers(caregivers.map(c => { if (c.code !== code) return c; const newPhone = toE164(editPhoneValue); const changed = newPhone !== c.phone; return { ...c, phone: newPhone, consentStatus: changed ? 'none' : (c.consentStatus || 'none'), smsOptIn: changed ? false : c.smsOptIn }; })); setEditingPhoneFor(null); setEditPhoneValue(''); setEditOptIn(false); };
        const deleteCaregiver = (code) => {
            if (!confirm(`Remove ${caregivers.find(c => c.code === code)?.name}?`)) return;
            updateCaregivers(caregivers.filter(c => c.code !== code));
            const next = { ...schedule }; Object.keys(next).forEach(d => { if (next[d] === code) delete next[d]; }); updateSchedule(next);
        };
        const sendReminder = async (sunday) => {
            const dateKey = formatDate(sunday);
            const code    = schedule[dateKey];
            const cg      = caregivers.find(c => c.code === code);
            if (!cg) return;
            if (!cg.phone) { alert(`No phone for ${cg.name}. Tap ✏️ to add one.`); return; }
            if (cg.consentStatus !== 'confirmed') {
                if (cg.consentStatus === 'pending') alert(`${cg.name} hasn't confirmed yet — they need to reply YES to the confirmation text before reminders can be sent.`);
                else if (cg.consentStatus === 'opted_out') alert(`${cg.name} has opted out of text messages and cannot be sent reminders.`);
                else alert(`${cg.name} hasn't confirmed SMS consent. Tap ✏️ next to their name and send a confirmation request — they must reply YES first.`);
                return;
            }
            const firstName = cg.name.split(' ')[0];
            const display   = `${sunday.getMonth() + 1}/${sunday.getDate()}`;
            const msg = `Hi ${firstName}, reminder that you are scheduled for Papi's care this Sunday ${display} from 6:00-8:00 PM. App: https://papi-sundaygap.netlify.app`;
            if (!confirm(`Send to ${cg.name} (${toDisplay(cg.phone)})?\n\n"${msg}"`)) return;
            setSendingDate(dateKey);
            try {
                const res    = await fetch('/.netlify/functions/send-sms', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ to: cg.phone, message: msg }) });
                const result = await res.json();
                if (res.ok) { setSentDates(prev => ({ ...prev, [dateKey]: true })); setTimeout(() => setSentDates(prev => { const n = {...prev}; delete n[dateKey]; return n; }), 4000); }
                else { alert(`Failed: ${result.error}`); }
            } catch { alert('Could not reach messaging service. Try again.'); }
            finally { setSendingDate(null); }
        };
        const sendConfirmation = async (code) => {
            const cg = caregivers.find(c => c.code === code);
            if (!cg) return;
            if (!cg.phone) { alert(`Add a phone number for ${cg.name} first (tap ✏️).`); return; }
            const msg = `Sunday Care Schedule: you've been added to receive reminders for Papi's Sunday care shift (6-8 PM). Reply YES to confirm, STOP to opt out. Msg & data rates may apply. 1 msg/week. Privacy: https://papi-sundaygap.netlify.app/privacy-policy.html`;
            if (!confirm(`Send a confirmation request to ${cg.name} (${toDisplay(cg.phone)})?\n\nThey must reply YES from their phone before any reminders can be sent.\n\n"${msg}"`)) return;
            setSendingDate('confirm-' + code);
            try {
                const res    = await fetch('/.netlify/functions/send-sms', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ to: cg.phone, message: msg }) });
                const result = await res.json();
                if (res.ok) { updateCaregivers(caregivers.map(c => c.code === code ? { ...c, consentStatus: 'pending', smsOptIn: false } : c)); }
                else { alert(`Failed: ${result.error}`); }
            } catch { alert('Could not reach messaging service. Try again.'); }
            finally { setSendingDate(null); }
        };

        return (
            <div style={{ fontFamily: '"Quicksand", sans-serif', background: 'linear-gradient(135deg,#f5f7fa 0%,#e8ecf1 100%)', minHeight: '100vh', padding: '6px', boxSizing: 'border-box' }}>
                {/* Header */}
                <div style={{ background: 'linear-gradient(135deg,#667eea 0%,#764ba2 100%)', borderRadius: '8px', padding: '8px 12px', marginBottom: '6px', boxShadow: '0 3px 12px rgba(102,126,234,0.3)', color: 'white' }}>
                    <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start' }}>
                        <div>
                            <h1 style={{ margin: '0 0 2px 0', fontSize: '15px', fontWeight: '700', letterSpacing: '-0.3px' }}>Sunday Care Schedule</h1>
                            <p style={{ margin: 0, fontSize: '11px', opacity: 0.95, fontWeight: '500' }}>MaCristina & Papi • 6:00-8:00 PM</p>
                        </div>
                        <div style={{ background: 'rgba(255,255,255,0.2)', borderRadius: '4px', padding: '3px 6px', fontSize: '9px', fontWeight: '600' }}>{firebaseAvailable ? '✓ SYNCED' : 'PREVIEW'}</div>
                    </div>
                </div>
                {/* Calendar + Reminders */}
                <div style={{ background: 'white', borderRadius: '8px', padding: '8px', marginBottom: '6px', boxShadow: '0 2px 4px rgba(0,0,0,0.08)' }}>
                    <h2 style={{ margin: '0 0 8px 0', fontSize: '13px', fontWeight: '700', color: '#2d3748' }}>{sundays.length}-Week Schedule</h2>
                    <div style={{ display: 'grid', gridTemplateColumns: 'repeat(6,1fr)', gap: '5px', marginBottom: '10px' }}>
                        {sundays.map(sunday => {
                            const dateKey   = formatDate(sunday);
                            const code      = schedule[dateKey];
                            const caregiver = caregivers.find(c => c.code === code);
                            const isUpcoming = sunday.getTime() === upcomingSunday.getTime();
                            return (
                                <div key={dateKey} onClick={() => setSelectedSunday(sunday)}
                                    style={{ aspectRatio: '1', borderRadius: '7px', border: isUpcoming ? '3px solid #000000' : '1px solid #e2e8f0', background: caregiver ? caregiver.color : '#ffffff', display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', cursor: 'pointer', transition: 'all 0.2s ease', boxShadow: caregiver ? '0 2px 4px rgba(0,0,0,0.15)' : '0 1px 2px rgba(0,0,0,0.05)', transform: selectedSunday === sunday ? 'scale(0.95)' : 'scale(1)' }}
                                    onMouseEnter={e => { if (!caregiver) e.currentTarget.style.background = '#f7fafc'; }}
                                    onMouseLeave={e => { if (!caregiver) e.currentTarget.style.background = '#ffffff'; }}>
                                    <div style={{ fontSize: '11px', fontWeight: '600', color: caregiver ? '#fff' : '#718096', marginBottom: '2px' }}>{formatDisplayDate(sunday)}</div>
                                    {caregiver ? <div style={{ fontSize: '13px', fontWeight: '700', color: '#fff', textShadow: '0 1px 2px rgba(0,0,0,0.2)' }}>{caregiver.code}</div> : <div style={{ fontSize: '14px', color: '#cbd5e0' }}>+</div>}
                                </div>
                            );
                        })}
                    </div>
                    <div style={{ borderTop: '1px solid #e2e8f0', paddingTop: '10px' }}>
                        <h3 style={{ margin: '0 0 6px 0', fontSize: '11px', fontWeight: '700', color: '#718096', textTransform: 'uppercase', letterSpacing: '0.5px' }}>📱 Send Reminders</h3>
                        <div style={{ display: 'flex', flexDirection: 'column', gap: '5px' }}>
                            {sundays.filter(s => s >= upcomingSunday).slice(0, 3).map(sunday => {
                                const dateKey   = formatDate(sunday);
                                const code      = schedule[dateKey];
                                const cg        = caregivers.find(c => c.code === code);
                                if (!cg) return (
                                    <div key={dateKey} style={{ display: 'flex', alignItems: 'center', gap: '8px', padding: '6px 8px', borderRadius: '7px', background: 'transparent', border: '2px solid #9b2c2c' }}>
                                        <div style={{ width: '20px', height: '20px', borderRadius: '4px', border: '2px solid #9b2c2c', display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0 }}>
                                            <span style={{ fontSize: '7px', fontWeight: '700', color: '#9b2c2c' }}>?</span>
                                        </div>
                                        <div style={{ flex: 1 }}>
                                            <span style={{ fontSize: '12px', fontWeight: '700', color: '#9b2c2c', letterSpacing: '0.5px' }}>UNASSIGNED</span>
                                            <span style={{ fontSize: '13px', color: '#9b2c2c', marginLeft: '6px', opacity: 0.9 }}>{formatDisplayDate(sunday)}</span>
                                        </div>
                                    </div>
                                );
                                const isSending = sendingDate === dateKey;
                                const justSent  = sentDates[dateKey];
                                return (
                                    <div key={dateKey} style={{ display: 'flex', alignItems: 'center', gap: '8px', padding: '6px 8px', borderRadius: '7px', background: `${cg.color}15`, border: `1px solid ${cg.color}30` }}>
                                        <div style={{ width: '20px', height: '20px', borderRadius: '4px', background: cg.color, display: 'flex', alignItems: 'center', justifyContent: 'center', color: 'white', fontSize: '8px', fontWeight: '700', flexShrink: 0 }}>{cg.code}</div>
                                        <div style={{ flex: 1 }}>
                                            <span style={{ fontSize: '12px', fontWeight: '600', color: '#2d3748' }}>{cg.name}</span>
                                            <span style={{ fontSize: '13px', color: '#4a5568', marginLeft: '6px' }}>{formatDisplayDate(sunday)}</span>
                                        </div>
                                        <button onClick={() => sendReminder(sunday)} disabled={isSending} style={{ background: justSent ? '#48bb78' : cg.color, color: 'white', border: 'none', borderRadius: '6px', padding: '4px 9px', fontSize: '11px', fontWeight: '600', cursor: isSending ? 'wait' : 'pointer', whiteSpace: 'nowrap', fontFamily: 'Quicksand', transition: 'background 0.2s' }}>
                                            {isSending ? '...' : justSent ? '✓ Sent' : '📱 Remind'}
                                        </button>
                                    </div>
                                );
                            })}
                        </div>
                    </div>
                </div>
                {/* Caregivers */}
                <div style={{ background: 'white', borderRadius: '8px', padding: '8px', boxShadow: '0 2px 4px rgba(0,0,0,0.08)' }}>
                    <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '8px' }}>
                        <h2 style={{ margin: 0, fontSize: '13px', fontWeight: '700', color: '#2d3748' }}>Caregivers</h2>
                        <button onClick={() => setShowAddCaregiver(!showAddCaregiver)} style={{ background: '#667eea', color: 'white', border: 'none', borderRadius: '5px', padding: '5px 8px', fontSize: '11px', fontWeight: '600', cursor: 'pointer', fontFamily: 'Quicksand' }}>{showAddCaregiver ? 'Cancel' : '+ Add'}</button>
                    </div>
                    {showAddCaregiver && (
                        <div style={{ background: '#f7fafc', borderRadius: '6px', padding: '8px', marginBottom: '8px' }}>
                            <input type="text" placeholder="Name" value={newCaregiver.name} onChange={e => setNewCaregiver(p => ({ ...p, name: e.target.value }))} style={{ width: '100%', padding: '6px', marginBottom: '5px', border: '1.5px solid #e2e8f0', borderRadius: '5px', fontSize: '12px', boxSizing: 'border-box', fontFamily: 'Quicksand' }} />
                            <input type="text" placeholder="2-Letter Code (e.g. AL)" value={newCaregiver.code} onChange={e => setNewCaregiver(p => ({ ...p, code: e.target.value.toUpperCase().slice(0,2) }))} maxLength={2} style={{ width: '100%', padding: '6px', marginBottom: '5px', border: '1.5px solid #e2e8f0', borderRadius: '5px', fontSize: '12px', boxSizing: 'border-box', fontFamily: 'Quicksand' }} />
                            <input type="tel" placeholder="(813) 555-1234" value={newCaregiver.phone} onChange={e => setNewCaregiver(p => ({ ...p, phone: formatAsTyped(e.target.value) }))} style={{ width: '100%', padding: '6px', marginBottom: '6px', border: '1.5px solid #e2e8f0', borderRadius: '5px', fontSize: '12px', boxSizing: 'border-box', fontFamily: 'Quicksand' }} />
                            <label style={{ display: 'flex', alignItems: 'flex-start', gap: '6px', marginBottom: '8px', cursor: 'pointer', padding: '7px 8px', background: newCaregiver.smsOptIn ? '#f0fff4' : '#fffbeb', borderRadius: '6px', border: `1px solid ${newCaregiver.smsOptIn ? '#9ae6b4' : '#f6e05e'}` }}>
                                <input type="checkbox" checked={newCaregiver.smsOptIn} onChange={e => setNewCaregiver(p => ({ ...p, smsOptIn: e.target.checked }))} style={{ marginTop: '2px', flexShrink: 0, accentColor: '#48bb78', width: '13px', height: '13px' }} />
                                <span style={{ fontSize: '10px', color: '#4a5568', lineHeight: '1.5' }}>I have this caregiver's permission to add their number. After saving, send them a confirmation text — they must reply YES before any reminders go out.</span>
                            </label>
                            <div style={{ marginBottom: '6px' }}>
                                <div style={{ fontSize: '11px', fontWeight: '600', color: '#718096', marginBottom: '4px' }}>Pick a color:</div>
                                <div style={{ display: 'grid', gridTemplateColumns: 'repeat(10,1fr)', gap: '3px' }}>
                                    {PALETTE.map(color => (<div key={color} onClick={() => setNewCaregiver(p => ({ ...p, color }))} style={{ width: '20px', height: '20px', borderRadius: '4px', background: color, cursor: 'pointer', border: newCaregiver.color === color ? '2px solid #2d3748' : '2px solid transparent', boxSizing: 'border-box' }} />))}
                                </div>
                            </div>
                            <button onClick={addCaregiver} disabled={!newCaregiver.name || !newCaregiver.code} style={{ width: '100%', background: newCaregiver.name && newCaregiver.code ? '#48bb78' : '#cbd5e0', color: 'white', border: 'none', borderRadius: '5px', padding: '6px', fontSize: '11px', fontWeight: '600', cursor: newCaregiver.name && newCaregiver.code ? 'pointer' : 'not-allowed', fontFamily: 'Quicksand' }}>Add Caregiver</button>
                        </div>
                    )}
                    {!showAddCaregiver && (
                        <div style={{ display: 'flex', flexDirection: 'column', gap: '5px' }}>
                            {caregivers.map(cg => (
                                <div key={cg.code} style={{ display: 'flex', alignItems: 'center', gap: '6px', background: '#f7fafc', borderRadius: '6px', padding: '5px 7px' }}>
                                    <div title="Change color" onClick={() => setEditingColorFor(editingColorFor === cg.code ? null : cg.code)} style={{ width: '24px', height: '24px', borderRadius: '5px', background: cg.color, display: 'flex', alignItems: 'center', justifyContent: 'center', fontWeight: '700', fontSize: '8px', color: '#fff', flexShrink: 0, boxShadow: '0 1px 3px rgba(0,0,0,0.15)', cursor: 'pointer' }}>{cg.code}</div>
                                    <div style={{ flex: 1, minWidth: 0 }}>
                                        <div style={{ fontSize: '11px', fontWeight: '600', color: '#2d3748', whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis' }}>{cg.name}</div>
                                        {editingPhoneFor === cg.code ? (
                                            <>
                                            <div style={{ display: 'flex', gap: '3px', marginTop: '2px' }}>
                                                <input type="tel" value={editPhoneValue} onChange={e => setEditPhoneValue(formatAsTyped(e.target.value))} placeholder="(813) 555-1234" style={{ flex: 1, padding: '2px 5px', borderRadius: '4px', border: '1.5px solid #e2e8f0', fontSize: '10px', fontFamily: 'Quicksand' }} />
                                                <button onClick={() => savePhone(cg.code)} style={{ background: '#48bb78', color: 'white', border: 'none', borderRadius: '4px', padding: '2px 6px', fontSize: '10px', fontWeight: '600', cursor: 'pointer' }}>✓</button>
                                                <button onClick={() => { setEditingPhoneFor(null); setEditOptIn(false); }} style={{ background: '#e2e8f0', color: '#4a5568', border: 'none', borderRadius: '4px', padding: '2px 6px', fontSize: '10px', fontWeight: '600', cursor: 'pointer' }}>✕</button>
                                            </div>
                                            <div style={{ fontSize: '9px', color: '#718096', marginTop: '4px', lineHeight: '1.4', padding: '4px 6px', background: '#f7fafc', borderRadius: '4px' }}>Changing the number resets consent. After saving, tap "Send confirm" — the caregiver must reply YES.</div>
                                            </>
                                        ) : (
                                            <div style={{ fontSize: '10px', color: cg.phone ? '#718096' : '#a0aec0' }}>
                                                {cg.phone ? toDisplay(cg.phone) : 'no phone — tap ✏️'}
                                                {cg.phone && (() => {
                                                    const st = cg.consentStatus || (cg.smsOptIn ? 'confirmed' : 'none');
                                                    const badge = { confirmed: ['● SMS ✓', '#38a169'], pending: ['● awaiting YES', '#d69e2e'], opted_out: ['● opted out', '#e53e3e'], none: ['● no consent', '#e53e3e'] }[st] || ['● no consent', '#e53e3e'];
                                                    return <span style={{ marginLeft: '5px', fontSize: '9px', fontWeight: '600', color: badge[1] }}>{badge[0]}</span>;
                                                })()}
                                                {cg.phone && (cg.consentStatus || 'none') !== 'confirmed' && (
                                                    <button onClick={() => sendConfirmation(cg.code)} disabled={sendingDate === 'confirm-' + cg.code} style={{ marginLeft: '6px', background: '#667eea', color: 'white', border: 'none', borderRadius: '4px', padding: '1px 6px', fontSize: '9px', fontWeight: '600', cursor: 'pointer', fontFamily: 'Quicksand' }}>{sendingDate === 'confirm-' + cg.code ? '...' : (cg.consentStatus === 'pending' ? 'Resend' : 'Send confirm')}</button>
                                                )}
                                            </div>
                                        )}
                                    </div>
                                    <button onClick={() => { setEditingPhoneFor(cg.code); setEditPhoneValue(toDisplay(cg.phone)); setEditOptIn(cg.smsOptIn || false); }} style={{ background: 'transparent', border: 'none', cursor: 'pointer', fontSize: '12px', padding: '2px', flexShrink: 0 }}>✏️</button>
                                    <button onClick={() => deleteCaregiver(cg.code)} style={{ background: 'none', border: 'none', color: '#e53e3e', cursor: 'pointer', padding: '1px', fontSize: '15px', lineHeight: 1, flexShrink: 0 }}>×</button>
                                </div>
                            ))}
                        </div>
                    )}
                </div>
                {editingColorFor && (
                    <div onClick={() => setEditingColorFor(null)} style={{ position: 'fixed', top: 0, left: 0, right: 0, bottom: 0, background: 'rgba(0,0,0,0.5)', display: 'flex', alignItems: 'center', justifyContent: 'center', padding: '16px', zIndex: 1000 }}>
                        <div onClick={e => e.stopPropagation()} style={{ background: 'white', borderRadius: '12px', padding: '14px', boxShadow: '0 20px 60px rgba(0,0,0,0.3)', width: '200px' }}>
                            <p style={{ margin: '0 0 10px 0', fontSize: '13px', fontWeight: '700', color: '#2d3748' }}>Change color for {caregivers.find(c => c.code === editingColorFor)?.name}</p>
                            <div style={{ display: 'grid', gridTemplateColumns: 'repeat(5,1fr)', gap: '5px', marginBottom: '10px' }}>
                                {PALETTE.map(color => (<div key={color} onClick={() => changeColor(editingColorFor, color)} style={{ width: '28px', height: '28px', borderRadius: '6px', background: color, cursor: 'pointer', border: caregivers.find(c => c.code === editingColorFor)?.color === color ? '3px solid #2d3748' : '3px solid transparent', boxSizing: 'border-box' }} />))}
                            </div>
                            <button onClick={() => setEditingColorFor(null)} style={{ width: '100%', background: '#edf2f7', color: '#2d3748', border: 'none', borderRadius: '8px', padding: '8px', fontSize: '12px', fontWeight: '600', cursor: 'pointer', fontFamily: 'Quicksand' }}>Cancel</button>
                        </div>
                    </div>
                )}
                {selectedSunday && (
                    <div onClick={() => setSelectedSunday(null)} style={{ position: 'fixed', top: 0, left: 0, right: 0, bottom: 0, background: 'rgba(0,0,0,0.5)', display: 'flex', alignItems: 'center', justifyContent: 'center', padding: '16px', zIndex: 1000 }}>
                        <div onClick={e => e.stopPropagation()} style={{ background: 'white', borderRadius: '16px', padding: '16px', maxWidth: '360px', width: '100%', maxHeight: '80vh', overflowY: 'auto', boxShadow: '0 20px 60px rgba(0,0,0,0.3)' }}>
                            <h3 style={{ margin: '0 0 6px 0', fontSize: '18px', fontWeight: '700', color: '#2d3748' }}>{formatDisplayDate(selectedSunday)}</h3>
                            <p style={{ margin: '0 0 14px 0', fontSize: '13px', color: '#718096' }}>Select a caregiver for this Sunday</p>
                            <div style={{ display: 'flex', flexDirection: 'column', gap: '8px', marginBottom: '12px' }}>
                                {caregivers.map(cg => (
                                    <button key={cg.code} onClick={() => assignCaregiver(selectedSunday, cg.code)}
                                        style={{ display: 'flex', alignItems: 'center', background: '#f7fafc', border: '2px solid #e2e8f0', borderRadius: '10px', padding: '10px 12px', cursor: 'pointer', transition: 'all 0.2s ease', fontFamily: 'Quicksand' }}
                                        onMouseEnter={e => { e.currentTarget.style.background = cg.color; e.currentTarget.style.borderColor = cg.color; e.currentTarget.querySelector('span').style.color = '#fff'; }}
                                        onMouseLeave={e => { e.currentTarget.style.background = '#f7fafc'; e.currentTarget.style.borderColor = '#e2e8f0'; e.currentTarget.querySelector('span').style.color = '#2d3748'; }}>
                                        <div style={{ width: '32px', height: '32px', borderRadius: '8px', background: cg.color, display: 'flex', alignItems: 'center', justifyContent: 'center', fontWeight: '700', fontSize: '13px', color: '#fff', marginRight: '10px', boxShadow: '0 2px 8px rgba(0,0,0,0.15)' }}>{cg.code}</div>
                                        <span style={{ fontSize: '15px', fontWeight: '600', color: '#2d3748', transition: 'all 0.2s ease' }}>{cg.name}</span>
                                    </button>
                                ))}
                            </div>
                            {schedule[formatDate(selectedSunday)] && (
                                <button onClick={() => clearAssignment(selectedSunday)} style={{ width: '100%', background: '#fed7d7', color: '#c53030', border: 'none', borderRadius: '10px', padding: '10px', fontSize: '13px', fontWeight: '600', cursor: 'pointer', marginBottom: '8px', fontFamily: 'Quicksand' }}>Clear Assignment</button>
                            )}
                            <button onClick={() => setSelectedSunday(null)} style={{ width: '100%', background: '#edf2f7', color: '#2d3748', border: 'none', borderRadius: '10px', padding: '10px', fontSize: '13px', fontWeight: '600', cursor: 'pointer', fontFamily: 'Quicksand' }}>Cancel</button>
                        </div>
                    </div>
                )}
            </div>
        );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<CaregiverCalendar />);
</script>
</body>
</html>
