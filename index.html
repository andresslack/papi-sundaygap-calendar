<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sunday Care Schedule - MaCristina & Papi</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0; padding: 0;
            font-family: 'Quicksand', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #f0f4f8;
        }
        #root { width: 100%; min-height: 100vh; }
    </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
    const { useState, useEffect } = React;

    const firebaseConfig = {
        apiKey: "AIzaSyD8CS9GHLmONH7Timj4bJyGPskZevOn8jg",
        authDomain: "papi-sundaygap.firebaseapp.com",
        databaseURL: "https://papi-sundaygap-default-rtdb.firebaseio.com",
        projectId: "papi-sundaygap",
        storageBucket: "papi-sundaygap.firebasestorage.app",
        messagingSenderId: "93846168368",
        appId: "1:93846168368:web:61c226190142d2de9d9ef5"
    };

    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const COLOR_PALETTE = [
        '#667eea','#f093fb','#4facfe','#43e97b','#fa709a',
        '#a18cd1','#fda085','#84fab0','#f6d365','#89f7fe'
    ];

    const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    const MONTHS_LONG = ['January','February','March','April','May','June','July','August','September','October','November','December'];

    const localDate = (d) => new Date(new Date(d).getTime() + new Date(d).getTimezoneOffset() * 60000);
    const formatDate = (d) => { const ld = localDate(d); return `${ld.getFullYear()}-${String(ld.getMonth()+1).padStart(2,'0')}-${String(ld.getDate()).padStart(2,'0')}`; };
    const displayDate = (d) => { const ld = localDate(d); return `${ld.getMonth()+1}/${ld.getDate()}`; };

    const getSundays = (n = 16) => {
        const today = new Date(); today.setHours(0,0,0,0);
        const day = today.getDay();
        const first = new Date(today); first.setDate(today.getDate() + (day === 0 ? 0 : 7 - day));
        return Array.from({length: n}, (_, i) => { const s = new Date(first); s.setDate(first.getDate() + i*7); return s; });
    };

    function CaregiverCalendar() {
        const [caregivers, setCaregivers]       = useState({});
        const [schedule, setSchedule]           = useState({});
        const [selectedSunday, setSelectedSunday] = useState(null);
        const [newName, setNewName]             = useState('');
        const [newPhone, setNewPhone]           = useState('');
        const [showAddForm, setShowAddForm]     = useState(false);
        const [editingId, setEditingId]         = useState(null);
        const [editPhone, setEditPhone]         = useState('');
        const [sendingKey, setSendingKey]       = useState(null);
        const [sentKeys, setSentKeys]           = useState({});
        const [loading, setLoading]             = useState(true);

        const sundays = getSundays(16);

        useEffect(() => {
            const cgRef = db.ref('caregivers');
            const scRef = db.ref('schedule');
            cgRef.on('value', s => { setCaregivers(s.val() || {}); setLoading(false); });
            scRef.on('value', s => setSchedule(s.val() || {}));
            return () => { cgRef.off(); scRef.off(); };
        }, []);

        const addCaregiver = () => {
            if (!newName.trim()) return;
            const id = Date.now().toString();
            const usedColors = Object.values(caregivers).map(c => c.color);
            const color = COLOR_PALETTE.find(c => !usedColors.includes(c)) || COLOR_PALETTE[Object.keys(caregivers).length % COLOR_PALETTE.length];
            db.ref(`caregivers/${id}`).set({ name: newName.trim(), phone: newPhone.trim(), color, code: newName.trim().charAt(0).toUpperCase() });
            setNewName(''); setNewPhone(''); setShowAddForm(false);
        };

        const deleteCaregiver = (id) => {
            db.ref(`caregivers/${id}`).remove();
            Object.entries(schedule).forEach(([date, cgId]) => { if (cgId === id) db.ref(`schedule/${date}`).remove(); });
        };

        const assignCaregiver = (cgId) => {
            db.ref(`schedule/${formatDate(selectedSunday)}`).set(cgId);
            setSelectedSunday(null);
        };

        const clearAssignment = () => {
            db.ref(`schedule/${formatDate(selectedSunday)}`).remove();
            setSelectedSunday(null);
        };

        const savePhone = (id) => {
            db.ref(`caregivers/${id}/phone`).set(editPhone.trim());
            setEditingId(null); setEditPhone('');
        };

        const sendReminder = async (sunday) => {
            const dateKey = formatDate(sunday);
            const cg = caregivers[schedule[dateKey]];
            if (!cg) return;
            if (!cg.phone) { alert(`No phone number for ${cg.name}. Tap ✏️ to add one.`); return; }

            const firstName = cg.name.split(' ')[0];
            const msg = `Hi ${firstName}, reminder that you are scheduled for Papi's care this Sunday ${displayDate(sunday)} from 6:00–8:00 PM. App: https://papi-sundaygap.netlify.app`;

            if (!window.confirm(`Send to ${cg.name} (${cg.phone})?\n\n"${msg}"`)) return;

            setSendingKey(dateKey);
            try {
                const res = await fetch('/.netlify/functions/send-sms', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ to: cg.phone, message: msg })
                });
                const result = await res.json();
                if (res.ok) {
                    setSentKeys(prev => ({ ...prev, [dateKey]: true }));
                    setTimeout(() => setSentKeys(prev => { const n = {...prev}; delete n[dateKey]; return n; }), 4000);
                } else {
                    alert(`Failed to send: ${result.error}`);
                }
            } catch (err) {
                alert('Could not reach the messaging service. Please try again.');
            } finally {
                setSendingKey(null);
            }
        };

        if (loading) return (
            <div style={{ display:'flex', justifyContent:'center', alignItems:'center', height:'100vh' }}>
                <div style={{ textAlign:'center', color:'#667eea' }}>
                    <div style={{ fontSize:'40px', marginBottom:'12px' }}>🗓️</div>
                    <div style={{ fontSize:'16px', fontWeight:'600', fontFamily:'Quicksand' }}>Loading schedule...</div>
                </div>
            </div>
        );

        return (
            <div style={{ maxWidth:'480px', margin:'0 auto', padding:'12px', fontFamily:'Quicksand' }}>

                {/* ── Header ── */}
                <div style={{ background:'linear-gradient(135deg,#667eea 0%,#764ba2 100%)', borderRadius:'16px', padding:'16px', marginBottom:'16px', color:'white', boxShadow:'0 6px 20px rgba(102,126,234,0.35)' }}>
                    <h1 style={{ margin:'0 0 4px 0', fontSize:'22px', fontWeight:'700', letterSpacing:'-0.5px' }}>Sunday Care Schedule</h1>
                    <p style={{ margin:0, fontSize:'13px', opacity:0.9, fontWeight:'500' }}>MaCristina & Papi • 6:00–8:00 PM</p>
                </div>

                {/* ── Calendar ── */}
                <div style={{ background:'white', borderRadius:'16px', padding:'16px', marginBottom:'16px', boxShadow:'0 2px 12px rgba(0,0,0,0.08)' }}>
                    <h2 style={{ margin:'0 0 12px 0', fontSize:'13px', fontWeight:'700', color:'#4a5568', textTransform:'uppercase', letterSpacing:'0.5px' }}>Upcoming Sundays</h2>
                    <div style={{ display:'flex', flexDirection:'column', gap:'8px' }}>
                        {sundays.map(sunday => {
                            const dateKey = formatDate(sunday);
                            const cgId    = schedule[dateKey];
                            const cg      = cgId ? caregivers[cgId] : null;
                            const ld      = localDate(sunday);
                            const isSending = sendingKey === dateKey;
                            const justSent  = sentKeys[dateKey];

                            return (
                                <div key={dateKey}
                                    onClick={() => setSelectedSunday(sunday)}
                                    style={{ display:'flex', alignItems:'center', gap:'10px', padding:'10px 12px', borderRadius:'12px', background: cg ? `${cg.color}15` : '#f7fafc', border:`1.5px solid ${cg ? cg.color+'40' : '#e2e8f0'}`, cursor:'pointer' }}>

                                    {/* Date badge */}
                                    <div style={{ minWidth:'44px', textAlign:'center', background: cg ? cg.color : '#e2e8f0', borderRadius:'10px', padding:'4px 6px', color: cg ? 'white' : '#718096' }}>
                                        <div style={{ fontSize:'10px', fontWeight:'600', opacity:0.85 }}>{MONTHS[ld.getMonth()]}</div>
                                        <div style={{ fontSize:'18px', fontWeight:'700', lineHeight:1 }}>{ld.getDate()}</div>
                                    </div>

                                    {/* Name or placeholder */}
                                    <div style={{ flex:1 }}>
                                        {cg
                                            ? <div style={{ fontSize:'14px', fontWeight:'600', color:'#2d3748' }}>{cg.name}</div>
                                            : <div style={{ fontSize:'13px', color:'#a0aec0', fontWeight:'500' }}>Tap to assign caregiver</div>
                                        }
                                    </div>

                                    {/* 📱 Remind button */}
                                    {cg && (
                                        <button
                                            onClick={e => { e.stopPropagation(); sendReminder(sunday); }}
                                            disabled={isSending}
                                            style={{ background: justSent ? '#48bb78' : cg.color, color:'white', border:'none', borderRadius:'8px', padding:'6px 10px', fontSize:'12px', fontWeight:'600', cursor: isSending ? 'wait' : 'pointer', whiteSpace:'nowrap', fontFamily:'Quicksand', transition:'background 0.2s' }}>
                                            {isSending ? '...' : justSent ? '✓ Sent' : '📱 Remind'}
                                        </button>
                                    )}
                                </div>
                            );
                        })}
                    </div>
                </div>

                {/* ── Caregivers ── */}
                <div style={{ background:'white', borderRadius:'16px', padding:'16px', boxShadow:'0 2px 12px rgba(0,0,0,0.08)' }}>
                    <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:'12px' }}>
                        <h2 style={{ margin:0, fontSize:'13px', fontWeight:'700', color:'#4a5568', textTransform:'uppercase', letterSpacing:'0.5px' }}>Caregivers</h2>
                        <button onClick={() => setShowAddForm(!showAddForm)} style={{ background:'#667eea', color:'white', border:'none', borderRadius:'8px', padding:'6px 12px', fontSize:'13px', fontWeight:'600', cursor:'pointer', fontFamily:'Quicksand' }}>+ Add</button>
                    </div>

                    {showAddForm && (
                        <div style={{ background:'#f7fafc', borderRadius:'10px', padding:'12px', marginBottom:'12px' }}>
                            <input type="text" placeholder="Full name" value={newName} onChange={e => setNewName(e.target.value)}
                                style={{ width:'100%', padding:'8px 10px', borderRadius:'8px', border:'1.5px solid #e2e8f0', fontSize:'13px', fontFamily:'Quicksand', marginBottom:'8px' }} />
                            <input type="tel" placeholder="Phone  e.g. +18135551234" value={newPhone} onChange={e => setNewPhone(e.target.value)}
                                style={{ width:'100%', padding:'8px 10px', borderRadius:'8px', border:'1.5px solid #e2e8f0', fontSize:'13px', fontFamily:'Quicksand', marginBottom:'8px' }} />
                            <div style={{ display:'flex', gap:'8px' }}>
                                <button onClick={addCaregiver} style={{ flex:1, background:'#667eea', color:'white', border:'none', borderRadius:'8px', padding:'8px', fontSize:'13px', fontWeight:'600', cursor:'pointer', fontFamily:'Quicksand' }}>Add</button>
                                <button onClick={() => setShowAddForm(false)} style={{ flex:1, background:'#e2e8f0', color:'#4a5568', border:'none', borderRadius:'8px', padding:'8px', fontSize:'13px', fontWeight:'600', cursor:'pointer', fontFamily:'Quicksand' }}>Cancel</button>
                            </div>
                        </div>
                    )}

                    <div style={{ display:'flex', flexDirection:'column', gap:'6px' }}>
                        {Object.entries(caregivers).map(([id, cg]) => (
                            <div key={id} style={{ display:'flex', alignItems:'center', gap:'10px', padding:'8px 10px', borderRadius:'10px', background:`${cg.color}15`, border:`1.5px solid ${cg.color}30` }}>
                                <div style={{ width:'32px', height:'32px', borderRadius:'8px', background:cg.color, display:'flex', alignItems:'center', justifyContent:'center', color:'white', fontSize:'14px', fontWeight:'700', flexShrink:0 }}>
                                    {cg.code || cg.name.charAt(0)}
                                </div>
                                <div style={{ flex:1, minWidth:0 }}>
                                    <div style={{ fontSize:'13px', fontWeight:'600', color:'#2d3748' }}>{cg.name}</div>
                                    {editingId === id ? (
                                        <div style={{ display:'flex', gap:'4px', marginTop:'4px' }}>
                                            <input type="tel" value={editPhone} onChange={e => setEditPhone(e.target.value)} placeholder="+18135551234"
                                                style={{ flex:1, padding:'4px 6px', borderRadius:'6px', border:'1.5px solid #e2e8f0', fontSize:'11px', fontFamily:'Quicksand' }} />
                                            <button onClick={() => savePhone(id)} style={{ background:'#48bb78', color:'white', border:'none', borderRadius:'6px', padding:'4px 8px', fontSize:'11px', fontWeight:'600', cursor:'pointer', fontFamily:'Quicksand' }}>✓</button>
                                            <button onClick={() => setEditingId(null)} style={{ background:'#e2e8f0', color:'#4a5568', border:'none', borderRadius:'6px', padding:'4px 8px', fontSize:'11px', fontWeight:'600', cursor:'pointer', fontFamily:'Quicksand' }}>✕</button>
                                        </div>
                                    ) : (
                                        <div style={{ fontSize:'11px', color: cg.phone ? '#718096' : '#a0aec0' }}>{cg.phone || 'No phone — tap ✏️ to add'}</div>
                                    )}
                                </div>
                                <button onClick={() => { setEditingId(id); setEditPhone(cg.phone || ''); }} style={{ background:'transparent', border:'none', cursor:'pointer', fontSize:'14px', padding:'4px', flexShrink:0 }}>✏️</button>
                                <button onClick={() => deleteCaregiver(id)} style={{ background:'#fed7d7', color:'#c53030', border:'none', borderRadius:'6px', padding:'4px 8px', fontSize:'11px', fontWeight:'600', cursor:'pointer', fontFamily:'Quicksand', flexShrink:0 }}>✕</button>
                            </div>
                        ))}
                    </div>
                </div>

                {/* ── Assignment Modal ── */}
                {selectedSunday && (
                    <div style={{ position:'fixed', inset:0, background:'rgba(0,0,0,0.5)', display:'flex', alignItems:'flex-end', justifyContent:'center', zIndex:1000, padding:'0 12px 12px' }}>
                        <div style={{ background:'white', borderRadius:'20px', padding:'20px', width:'100%', maxWidth:'456px', boxShadow:'0 -4px 30px rgba(0,0,0,0.15)' }}>
                            <h3 style={{ margin:'0 0 4px 0', fontSize:'16px', fontWeight:'700', color:'#2d3748' }}>Assign Caregiver</h3>
                            <p style={{ margin:'0 0 14px 0', fontSize:'13px', color:'#718096' }}>
                                {(() => { const ld = localDate(selectedSunday); return `Sunday, ${MONTHS_LONG[ld.getMonth()]} ${ld.getDate()}, ${ld.getFullYear()}`; })()}
                            </p>
                            <div style={{ display:'flex', flexDirection:'column', gap:'8px', marginBottom:'10px' }}>
                                {Object.entries(caregivers).map(([id, cg]) => (
                                    <button key={id} onClick={() => assignCaregiver(id)}
                                        style={{ display:'flex', alignItems:'center', gap:'10px', padding:'10px 12px', borderRadius:'10px', background:`${cg.color}15`, border:`1.5px solid ${cg.color}40`, cursor:'pointer', textAlign:'left', fontFamily:'Quicksand' }}>
                                        <div style={{ width:'30px', height:'30px', borderRadius:'8px', background:cg.color, display:'flex', alignItems:'center', justifyContent:'center', color:'white', fontSize:'13px', fontWeight:'700' }}>{cg.code || cg.name.charAt(0)}</div>
                                        <span style={{ fontSize:'14px', fontWeight:'600', color:'#2d3748' }}>{cg.name}</span>
                                    </button>
                                ))}
                            </div>
                            {schedule[formatDate(selectedSunday)] && (
                                <button onClick={clearAssignment} style={{ width:'100%', background:'#fed7d7', color:'#c53030', border:'none', borderRadius:'10px', padding:'10px', fontSize:'13px', fontWeight:'600', cursor:'pointer', marginBottom:'8px', fontFamily:'Quicksand' }}>Clear Assignment</button>
                            )}
                            <button onClick={() => setSelectedSunday(null)} style={{ width:'100%', background:'#edf2f7', color:'#2d3748', border:'none', borderRadius:'10px', padding:'10px', fontSize:'13px', fontWeight:'600', cursor:'pointer', fontFamily:'Quicksand' }}>Cancel</button>
                        </div>
                    </div>
                )}

            </div>
        );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<CaregiverCalendar />);
</script>
</body>
</html>
